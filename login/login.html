<!DOCTYPE html>
<html>
  <head>
    <title>Login - @n0rby90</title>
    <link rel="stylesheet" type="text/css" href="/login/style_login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <div class="container">
      <div class="login-box">
        <h2>Login</h2>
        <form id="loginForm">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter email" />
          <span id="emailError" class="error-message" style="display:none">Email is required</span>
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" />
          <span id="passwordError" class="error-message" style="display:none">Password is required</span>
          <button type="submit">Login</button>
          <span class="cta">Don't have an account yet? <a href="/signup/signup.html">Register here</a></span>
        </form>
      </div>
    </div>
    <script src="/login/main-login.js"></script>
  </body>
</html>
