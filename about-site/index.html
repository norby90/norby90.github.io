<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihai | My Links & Projects</title>
    <meta name="description" content="Personal linktree-style site for projects and social media.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>
    <canvas id="particle-canvas"></canvas>

    <main class="container">
        <header class="profile-section">
            <div class="profile-image-container">
                <img src="profile1.png" alt="Profile Photo" id="profile-img">
            </div>
            <h1 id="profile-name">Mihai</h1>
            <p id="profile-bio">Tech Enthusiast & Developer</p>
        </header>

        <section class="links-section">
            <a href="https://norby90.github.io/index.html" class="link-card" id="link-github">
                <span class="icon-wrapper"><i class="fa-brands fa-github"></i></span>
                <span class="link-text">Atestat Site</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a href="#" class="link-card" id="link-linkedin">
                <span class="icon-wrapper"><i class="fa-brands fa-linkedin-in"></i></span>
                <span class="link-text">LinkedIn Professional</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a href="#" class="link-card" id="link-twitter">
                <span class="icon-wrapper"><i class="fa-brands fa-twitter"></i></span>
                <span class="link-text">Twitter / X</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a href="#" class="link-card" id="link-portfolio">
                <span class="icon-wrapper"><i class="fa-solid fa-briefcase"></i></span>
                <span class="link-text">Personal Portfolio</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a href="#" class="link-card" id="link-email">
                <span class="icon-wrapper"><i class="fa-solid fa-envelope"></i></span>
                <span class="link-text">Contact Me</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
        </section>

        <footer class="social-footer">
            <div class="social-icons">
                <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
                <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </footer>
    </main>

    <script>
        // Particle System
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }

            update() {
                // Mouse interaction
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 20;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 20;
                    }
                }

                this.x += this.speedX;
                this.y += this.speedY;

                // Keep particles in view
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Card hover effect
        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
</body>

</html>
