<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihai Acatrinei | My Links</title>
    <meta name="description" content="Personal linktree-style site for projects and social media.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise-overlay"></div>
    <canvas id="particle-canvas"></canvas>

    <main class="container">
        <header class="profile-section">
            <div class="profile-image-container">
                <img src="profile1.png" oncontextmenu="false;" draggable="false" alt="Profile Photo" id="profile-img">
            </div>
            <h1 id="profile-name">Mihai Acatrinei</h1>
            <p id="profile-bio">Learning web development and building small projects.</p>
        </header>

        <section class="links-section">
            <a href="https://norby90.github.io/site-atestat/" class="link-card" id="link-github">
                <span class="icon-wrapper"><i class="fa-brands fa-github"></i></span>
                <span class="link-text">Atestat Site</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a href="https://www.instagram.com/mihaii_90/" class="link-card" id="link-instagram">
                <span class="icon-wrapper"><i class="fa-brands fa-instagram"></i></span>
                <span class="link-text">Instagram</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a href="https://github.com/norby90" class="link-card" id="link-portfolio">
                <span class="icon-wrapper"><i class="fa-brands fa-github"></i></span>
                <span class="link-text">Personal Portfolio</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
            <a href="mailto:mihai440@proton.me" class="link-card" id="link-email">
                <span class="icon-wrapper"><i class="fa-solid fa-envelope"></i></span>
                <span class="link-text">Contact Me</span>
                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
            </a>
        </section>

        <footer class="social-footer">
            <div class="social-icons">
                <a href="https://www.instagram.com/mihaii_90/" aria-label="Instagram"><i
                        class="fa-brands fa-instagram"></i></a>
                <a href="https://discord.gg/D4D82Q923f" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
